<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Counter</title>
  <style>body{font-family:Arial;text-align:center;padding:50px;} #counter{font-size:6rem;color:#0066ff;}</style>
</head>
<body>
  <h1>Live Requests</h1>
  <div id="counter">0</div>

  <script>
    setInterval(async () => {
      const res = await fetch('/counter');
      const data = await res.json();
      document.getElementById('counter').textContent = data.liveRequests;
    }, 1000);
  </script>
</body>
</html>
