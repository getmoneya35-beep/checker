<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Counter</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

#counter {
  font-size: 6rem;
  color: #0066ff;
}

#ips {
  margin: 20px auto;
  max-width: 400px;
  text-align: left;
}

.ip {
  background: #f1f1f1;
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
}
</style>

</head>

<body>

<h1>Live Requests</h1>

<div id="counter">0</div>

<h2>Last 10 IPs</h2>

<div id="ips"></div>


<script>
async function update() {
  const res = await fetch('/api/counter');
  const data = await res.json();

  document.getElementById("counter").textContent =
    data.liveRequests;

  document.getElementById("ips").innerHTML =
    data.lastIPs.map(ip =>
      `<div class="ip">${ip}</div>`
    ).join("");
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
